name: sql-inject
version: 2.0.0
description: SQL 注入检测 — 支持整数型/字符型/报错/布尔盲注/时间盲注/UNION/ORDER BY/UPDATE/INSERT/Cookie/UA/Referer/二次注入/空格绕过
category: vuln
engine: python

params:
  - name: url
    label: 目标 URL（用 * 标记注入点）
    type: string
    required: true
    placeholder: "http://example.com/page?id=1*"
  - name: method
    label: 请求方法
    type: select
    options: ["GET", "POST"]
    default: "GET"
  - name: post_data
    label: POST 数据（用 * 标记注入点）
    type: string
    placeholder: "username=admin*&password=123"
  - name: cookie
    label: Cookie（用 * 标记注入点）
    type: string
    placeholder: "id=1*"
  - name: user_agent
    label: User-Agent（用 * 标记注入点）
    type: string
    placeholder: "Mozilla/5.0*"
  - name: referer
    label: Referer（用 * 标记注入点）
    type: string
    placeholder: "http://example.com*"
  - name: x_forwarded_for
    label: X-Forwarded-For（用 * 标记注入点）
    type: string
    placeholder: "127.0.0.1*"
  - name: trigger_url
    label: 二次注入触发 URL（可选）
    type: string
    placeholder: "http://example.com/profile"
  - name: space_bypass
    label: 过滤空格绕过
    type: select
    options: ["false", "true"]
    default: "false"
  - name: timeout
    label: 超时(秒)
    type: number
    default: 10

output:
  type: table
  columns:
    - { key: "param", label: "参数" }
    - { key: "position", label: "注入位置" }
    - { key: "type", label: "注入类型" }
    - { key: "payload", label: "Payload" }
    - { key: "evidence", label: "依据" }
