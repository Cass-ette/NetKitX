name: webshell
version: 2.1.0
description: WebShell 管理工具 - 连接测试/命令执行/文件管理/数据库操作/Shell检测
category: exploit
engine: python
mode: session

params:
  - name: url
    label: WebShell URL
    type: string
    required: true
    placeholder: "http://target.com/shell.php"

  - name: password
    label: 连接密码
    type: string
    required: true
    default: "cmd"
    placeholder: "Shell 参数名或密码"

  - name: shell_type
    label: Shell 类型
    type: select
    options:
      - "php_eval"
      - "php_assert"
      - "php_base64"
      - "asp_eval"
      - "jsp_eval"
    default: "php_eval"

  - name: operation
    label: 操作类型
    type: select
    options:
      - "test"        # 连接测试
      - "exec"        # 执行命令
      - "listdir"     # 列目录
      - "readfile"    # 读文件
      - "writefile"   # 写文件
      - "delete"      # 删除文件/目录
      - "download"    # 下载文件 (base64)
      - "fileinfo"    # 文件详情
      - "sysinfo"     # 系统信息
      - "dbquery"     # 数据库查询
      - "detect"      # 自动检测 Shell 类型
    default: "test"

  - name: command
    label: 执行命令
    type: string
    placeholder: "id (Linux) 或 whoami (Windows)"

  - name: path
    label: 文件/目录路径
    type: string
    placeholder: "/tmp 或 C:\\Windows\\Temp"

  - name: content
    label: 文件内容
    type: string
    placeholder: "写入文件的内容"

  - name: db_host
    label: 数据库主机
    type: string
    default: "localhost"
    placeholder: "127.0.0.1"

  - name: db_user
    label: 数据库用户
    type: string
    default: "root"
    placeholder: "root"

  - name: db_pass
    label: 数据库密码
    type: string
    placeholder: "数据库密码"

  - name: db_name
    label: 数据库名
    type: string
    placeholder: "目标数据库名"

  - name: sql
    label: SQL 语句
    type: string
    placeholder: "SELECT * FROM users LIMIT 10"

  - name: timeout
    label: 超时(秒)
    type: number
    default: 15

output:
  type: table
  columns:
    - key: operation
      label: 操作
    - key: status
      label: 状态
    - key: output
      label: 输出
    - key: details
      label: 详情
