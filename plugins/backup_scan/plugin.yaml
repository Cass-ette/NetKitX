name: backup-scan
version: 1.0.0
description: 备份文件探测 — 扫描 .bak/.zip/.sql 等敏感备份文件
category: recon
engine: python

params:
  - name: url
    label: 目标 URL
    type: string
    required: true
    placeholder: "http://example.com"
  - name: concurrency
    label: 并发数
    type: number
    default: 20
  - name: timeout
    label: 超时(秒)
    type: number
    default: 5

output:
  type: table
  columns:
    - { key: "url", label: "URL" }
    - { key: "status", label: "状态码" }
    - { key: "size", label: "大小" }
    - { key: "content_type", label: "类型" }
