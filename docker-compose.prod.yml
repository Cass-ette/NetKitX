services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
      - "9090:9090"
    env_file:
      - ./backend/.env
    environment:
      - PLUGINS_DIR=/app/plugins
      - ENGINES_DIR=/app/engines/bin
      - SANDBOX_IMAGE=netkitx-sandbox
      - SANDBOX_API_URL=http://156.225.20.57
      - ALLOWED_ORIGINS=["https://wql.me"]
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
    group_add:
      - "997"
    volumes:
      - plugins_data:/app/plugins
      - engines_data:/app/engines/bin
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: sh -c "uvicorn app.monitor:app --host 0.0.0.0 --port 9090 & uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    restart: always

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env
    environment:
      - PLUGINS_DIR=/app/plugins
      - ENGINES_DIR=/app/engines/bin
    volumes:
      - plugins_data:/app/plugins
      - engines_data:/app/engines/bin
    depends_on:
      - backend
      - redis
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ""
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    restart: always

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: netkitx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: netkitx
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netkitx"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    restart: always

volumes:
  pgdata:
  redisdata:
  plugins_data:
  engines_data:
